<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Claude Gauge Settings</title>
  <link rel="stylesheet" href="https://sdpi-components.dev/css/sdpi.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 8px;
      background: #2d2d2d;
      color: #c8c8c8;
    }
    .sdpi-wrapper {
      padding: 0 16px;
    }
    .sdpi-item {
      display: flex;
      align-items: center;
      margin: 8px 0;
    }
    .sdpi-item-label {
      flex: 0 0 90px;
      font-size: 9pt;
      color: #969696;
    }
    .sdpi-item-value {
      flex: 1;
    }
    select {
      width: 100%;
      padding: 4px 8px;
      background: #3b3b3b;
      color: #d8d8d8;
      border: 1px solid #555;
      border-radius: 3px;
      font-size: 9pt;
    }
    .info {
      margin-top: 16px;
      padding: 8px;
      background: #363636;
      border-radius: 4px;
      font-size: 8pt;
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-item">
      <div class="sdpi-item-label">Refresh</div>
      <div class="sdpi-item-value">
        <select id="refreshInterval">
          <option value="5">Every 5 minutes</option>
          <option value="10">Every 10 minutes</option>
          <option value="15" selected>Every 15 minutes</option>
          <option value="30">Every 30 minutes</option>
        </select>
      </div>
    </div>
    <div class="info">
      <strong>Claude Gauge</strong><br/>
      Requires Claude Desktop to be installed and signed in.<br/>
      Press the key to manually refresh usage data.<br/><br/>
      Not affiliated with or endorsed by Anthropic.
    </div>
  </div>

  <script>
    let websocket = null;
    let uuid = null;
    let actionInfo = null;

    function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
      uuid = inPropertyInspectorUUID;
      actionInfo = JSON.parse(inActionInfo);

      websocket = new WebSocket("ws://127.0.0.1:" + inPort);

      websocket.onopen = function () {
        websocket.send(JSON.stringify({
          event: inRegisterEvent,
          uuid: uuid,
        }));

        // Load saved settings
        const settings = actionInfo.payload.settings;
        if (settings && settings.refreshInterval) {
          document.getElementById("refreshInterval").value = settings.refreshInterval;
        }
      };

      websocket.onmessage = function (evt) {
        const data = JSON.parse(evt.data);
        if (data.event === "didReceiveSettings" && data.payload && data.payload.settings) {
          const settings = data.payload.settings;
          if (settings.refreshInterval) {
            document.getElementById("refreshInterval").value = settings.refreshInterval;
          }
        }
      };
    }

    document.getElementById("refreshInterval").addEventListener("change", function () {
      const value = parseInt(this.value, 10);
      if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(JSON.stringify({
          event: "setSettings",
          context: uuid,
          payload: { refreshInterval: value },
        }));
      }
    });
  </script>
</body>
</html>
